<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Driver</title>

<style>

/* ===== GLOBAL ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    color: white;
    margin: 0;
}

/* ===== NAVBAR ===== */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(15,23,42,0.95);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
}

.nav-links {
    display: flex;
    gap: 20px;
}

.menu-toggle {
    display: none;
    cursor: pointer;
}

@media(max-width:768px){
    .menu-toggle { display:block; }
    .nav-links {
        display:none;
        flex-direction: column;
        position:absolute;
        top:60px;
        width:100%;
        background:#0f172a;
    }
    .nav-links.show { display:flex; }
}

/* ===== CONTAINER ===== */
.container {
    padding:100px 20px;
}

/* ===== FORM ===== */
.form-card {
    background: rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    max-width:400px;
}

input {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

button {
    margin-top:15px;
    padding:10px;
    border:none;
    background:#6366f1;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

/* ===== TABLE ===== */
.table-container {
    overflow-x:auto;
}

table {
    width:100%;
    min-width:600px;
    margin-top:20px;
}

.popup {
    position:fixed;
    top:20px;
    right:20px;
    background:#22c55e;
    padding:10px;
    display:none;
}

</style>
</head>

<body>

<nav>
    <div>🚍 TransportAI</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/add_driver">Drivers</a>
        <a href="/add_conductor">Conductors</a>
    </div>
</nav>

<div class="container">

<h2>Register Driver</h2>

<div class="form-card">
<form id="driverForm">
    Name: <input name="name" required>
    Email: <input name="email" required>
    Phone: <input name="phone" required>
    <button type="submit" id="submitBtn">Add</button>
</form>
</div>

<input type="text" id="search" placeholder="Search..." onkeyup="searchTable()">

<div class="table-container">
<table id="driverTable">
<thead>
<tr>
<th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<button onclick="prevPage()">Prev</button>
<button onclick="nextPage()">Next</button>

</div>

<div id="popup" class="popup">Success</div>

<script>

function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("show")
}

let data=[], page=1, limit=20
let isEdit = false

// ================= SUBMIT =================
document.getElementById("driverForm").addEventListener("submit", function(e){
    e.preventDefault()

    let formData = new FormData(this)
    let url = isEdit ? "/update_driver" : "/add_driver"

    fetch(url,{method:"POST",body:formData})
    .then(()=>{

        showPopup(isEdit ? "Updated Successfully" : "Added Successfully")
        load()

        this.reset()
        isEdit = false

        document.getElementById("submitBtn").innerText = "Add"
    })
})

// ================= POPUP =================
function showPopup(msg){
    let p=document.getElementById("popup")
    p.innerText="✅ "+msg
    p.style.display="block"
    setTimeout(()=>p.style.display="none",2000)
}

// ================= LOAD =================
function load(){
    fetch("/get_drivers")
    .then(r=>r.json())
    .then(d=>{
        data=d
        display()
    })
}

// ================= DISPLAY =================
function display(){
    let tb=document.querySelector("tbody")
    tb.innerHTML=""
    let start=(page-1)*limit

    data.slice(start,start+limit).forEach(r=>{
        tb.innerHTML+=`
        <tr>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
        <td>${r[2]}</td>
        <td>${r[3]}</td>
        <td>
            <button onclick="edit(${r[0]},'${r[1]}','${r[2]}','${r[3]}')">Edit</button>
            <button onclick="del(${r[0]})">Delete</button>
        </td>
        </tr>`
    })
}

// ================= EDIT =================
function edit(id,name,email,phone){

    document.querySelector("input[name=name]").value=name
    document.querySelector("input[name=email]").value=email
    document.querySelector("input[name=phone]").value=phone

    let form=document.getElementById("driverForm")

    let old=document.querySelector("input[name=id]")
    if(old) old.remove()

    let hidden=document.createElement("input")
    hidden.type="hidden"
    hidden.name="id"
    hidden.value=id
    form.appendChild(hidden)

    isEdit = true

    document.getElementById("submitBtn").innerText="Update"

    window.scrollTo({ top: 0, behavior: 'smooth' })
}

// ================= DELETE =================
function del(id){
    fetch("/delete_driver/"+id)
    .then(()=>load())
}

// ================= SEARCH =================
function searchTable(){
    let v=document.getElementById("search").value.toLowerCase()
    let tb=document.querySelector("tbody")
    tb.innerHTML=""

    data.filter(d=>d[1].toLowerCase().includes(v))
    .forEach(r=>{
        tb.innerHTML+=`
        <tr>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
        <td>${r[2]}</td>
        <td>${r[3]}</td>
        <td>
            <button onclick="edit(${r[0]},'${r[1]}','${r[2]}','${r[3]}')">Edit</button>
            <button onclick="del(${r[0]})">Delete</button>
        </td>
        </tr>`
    })
}

// ================= PAGINATION =================
function nextPage(){ if(page*limit<data.length){page++;display()} }
function prevPage(){ if(page>1){page--;display()} }

load()

</script>

</body>
</html>
