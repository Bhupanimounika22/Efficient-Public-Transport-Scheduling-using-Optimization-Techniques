<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - Transport AI</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --dark: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: white;
            min-height: 100vh;
        }

        /* NAVBAR */
        nav {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            z-index: 1000;
        }

        nav h2 {
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav a {
            color: white;
            text-decoration: none;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* MAIN */
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 80px;
        }

        /* CARD */
        .card {
            width: 100%;
            max-width: 550px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(99,102,241,0.2);
            animation: fadeIn 1s ease;
            text-align: center;
        }

        @keyframes fadeIn {
            from {opacity:0; transform:translateY(30px);}
            to {opacity:1; transform:translateY(0);}
        }

        .card h2 {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #60a5fa, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* STATS */
        .stat {
            font-size: 18px;
            margin: 10px 0;
        }

        .stat b {
            color: #60a5fa;
        }

        /* CHART */
        canvas {
            margin-top: 20px;
        }

        /* BUTTON */
        .btn-back {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(99,102,241,0.5);
        }

        /* RESPONSIVE */
        @media(max-width:768px){
            nav ul {
                gap: 1rem;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>🚍 Transport AI</h2>
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/predict">Predict</a></li>
        <li><a href="/about">About</a></li>
    </ul>
</nav>

<!-- RESULT -->
<main>
    <div class="card">

        <h2>📊 Prediction Result</h2>

        <div class="stat">👥 Passengers: <b>{{ passengers }}</b></div>
        <div class="stat">🚌 Buses: <b>{{ buses }}</b></div>
        <div class="stat">✅ Served: <b>{{ served }}</b></div>
        <div class="stat">⏳ Waiting: <b>{{ waiting }}</b></div>

        <canvas id="myChart"></canvas>

        <button class="btn-back" onclick="window.location.href='/predict'">
            🔙 Back to Predict
        </button>
        <h2 class="stat">{{ message }}</h2>

    </div>
</main>

<script>
    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Passengers', 'Buses'],
            datasets: [{
                label: 'Comparison',
                data: [{{ passengers }}, {{ buses }}],
                backgroundColor: ['#6366f1', '#ec4899']
            }]
        },
        options: {
            plugins: {
                legend: { labels: { color: 'white' } }
            },
            scales: {
                x: { ticks: { color: 'white' } },
                y: { ticks: { color: 'white' }, beginAtZero: true }
            }
        }
    });
</script>

</body>
</html>
